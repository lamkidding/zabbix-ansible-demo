---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-proxy
  namespace: zabbix
  labels: { app: zabbix, component: proxy }
spec:
  replicas: 1
  selector:
    matchLabels: { app: zabbix, component: proxy }
  template:
    metadata:
      labels: { app: zabbix, component: proxy }
    spec:
      containers:
        - name: zabbix-proxy
          image: zabbix/zabbix-proxy-sqlite3:7.0-ubuntu-latest
          ports:
            - { containerPort: 10051, name: trapper }
          env:
            - { name: ZBX_PROXYMODE, value: "0" }
            - { name: ZBX_HOSTNAME, value: proxy-secure-net }
            - { name: ZBX_SERVER_HOST, value: zabbix-server-svc }
            - { name: ZBX_SERVER_PORT, value: "10051" }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          readinessProbe:
            tcpSocket: { port: 10051 }
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-proxy-svc
  namespace: zabbix
  labels: { app: zabbix, component: proxy }
spec:
  type: ClusterIP
  ports:
    - { port: 10051, targetPort: 10051, name: trapper }
  selector: { app: zabbix, component: proxy }
