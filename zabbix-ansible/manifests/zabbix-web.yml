---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: zabbix
  labels: { app: zabbix, component: web }
spec:
  replicas: 1
  selector:
    matchLabels: { app: zabbix, component: web }
  template:
    metadata:
      labels: { app: zabbix, component: web }
    spec:
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-pgsql:7.0-ubuntu-latest
          ports:
            - { containerPort: 8080, name: http }
          env:
            - { name: ZBX_SERVER_HOST, value: zabbix-server-svc }
            - { name: DB_SERVER_HOST, value: postgres-svc }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: zabbix-db-secret, key: db-name } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: zabbix-db-secret, key: db-user } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: zabbix-db-secret, key: db-password } }
            - { name: PHP_TZ, value: Europe/Zurich }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-web-svc
  namespace: zabbix
  labels: { app: zabbix, component: web }
spec:
  type: NodePort
  ports:
    - { port: 8080, targetPort: 8080, nodePort: 30080, name: http }
  selector: { app: zabbix, component: web }
