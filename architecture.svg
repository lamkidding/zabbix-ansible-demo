<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="secureGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#336791"/>
      <stop offset="100%" stop-color="#264f73"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="proxyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="linuxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="ansibleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Zabbix Monitoring Stack — Deployment Architecture</text>
  <text x="550" y="55" text-anchor="middle" font-size="12" fill="#64748b">k3s cluster (namespace: zabbix) · Podman runtime · Ansible automation</text>

  <!-- k3s Cluster border -->
  <rect x="30" y="70" width="1040" height="650" rx="10" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="50" y="92" font-size="14" font-weight="600" fill="#475569">k3s Cluster</text>
  <text x="168" y="92" font-size="11" fill="#94a3b8">namespace: zabbix</text>

  <!-- ===== Docker/Cloud Zone ===== -->
  <rect x="50" y="105" width="1000" height="215" rx="8" fill="url(#cloudGrad)" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="70" y="128" font-size="13" font-weight="700" fill="#1e40af">Docker / Cloud Zone</text>

  <!-- PostgreSQL -->
  <rect x="80" y="145" width="220" height="155" rx="6" fill="white" stroke="#cbd5e1" filter="url(#shadowSm)"/>
  <rect x="80" y="145" width="220" height="30" rx="6" fill="url(#pgGrad)"/>
  <rect x="80" y="165" width="220" height="10" fill="url(#pgGrad)"/>
  <text x="190" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="white">PostgreSQL 16</text>
  <text x="190" y="196" text-anchor="middle" font-size="11" fill="#475569">postgres:16-alpine</text>
  <text x="190" y="214" text-anchor="middle" font-size="11" fill="#475569">StatefulSet · 1 replica</text>
  <text x="190" y="236" text-anchor="middle" font-size="11" fill="#64748b">PVC: 5 Gi (local-path)</text>
  <text x="190" y="254" text-anchor="middle" font-size="11" fill="#64748b">Service: postgres-svc</text>
  <text x="190" y="276" text-anchor="middle" font-size="10" fill="#94a3b8">Port 5432</text>

  <!-- Zabbix Server -->
  <rect x="340" y="145" width="260" height="155" rx="6" fill="white" stroke="#cbd5e1" filter="url(#shadowSm)"/>
  <rect x="340" y="145" width="260" height="30" rx="6" fill="url(#serverGrad)"/>
  <rect x="340" y="165" width="260" height="10" fill="url(#serverGrad)"/>
  <text x="470" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="white">Zabbix Server 7.0</text>
  <text x="470" y="196" text-anchor="middle" font-size="11" fill="#475569">zabbix-server-pgsql · Deployment</text>
  <text x="470" y="214" text-anchor="middle" font-size="11" fill="#64748b">Port 10051 (trapper)</text>
  <rect x="360" y="228" width="220" height="28" rx="4" fill="#fef2f2" stroke="#fecaca"/>
  <text x="470" y="247" text-anchor="middle" font-size="10" fill="#991b1b">Sidecar: zabbix-agent2 :10050</text>
  <text x="470" y="268" text-anchor="middle" font-size="10" fill="#94a3b8">Templates: Zabbix server health</text>
  <text x="470" y="282" text-anchor="middle" font-size="10" fill="#94a3b8">+ Linux by Zabbix agent</text>

  <!-- Zabbix Web -->
  <rect x="640" y="145" width="220" height="155" rx="6" fill="white" stroke="#cbd5e1" filter="url(#shadowSm)"/>
  <rect x="640" y="145" width="220" height="30" rx="6" fill="url(#webGrad)"/>
  <rect x="640" y="165" width="220" height="10" fill="url(#webGrad)"/>
  <text x="750" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="white">Zabbix Web</text>
  <text x="750" y="196" text-anchor="middle" font-size="11" fill="#475569">zabbix-web-nginx-pgsql</text>
  <text x="750" y="214" text-anchor="middle" font-size="11" fill="#475569">Deployment · 1 replica</text>
  <text x="750" y="236" text-anchor="middle" font-size="11" fill="#64748b">Service: zabbix-web-svc</text>
  <text x="750" y="254" text-anchor="middle" font-size="11" fill="#64748b">NodePort 30080</text>
  <rect x="680" y="266" width="140" height="20" rx="4" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="750" y="280" text-anchor="middle" font-size="10" fill="#9a3412">http://localhost:30080</text>

  <!-- DB connection arrow -->
  <line x1="300" y1="222" x2="340" y2="222" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="216" text-anchor="middle" font-size="9" fill="#64748b">SQL</text>

  <!-- Web to Server arrow -->
  <line x1="640" y1="222" x2="600" y2="222" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="620" y="216" text-anchor="middle" font-size="9" fill="#64748b">API</text>

  <!-- ===== Secure Network Zone ===== -->
  <rect x="50" y="340" width="1000" height="360" rx="8" fill="url(#secureGrad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="70" y="363" font-size="13" font-weight="700" fill="#166534">Secure Network Zone</text>

  <!-- Zabbix Proxy -->
  <rect x="380" y="375" width="300" height="85" rx="6" fill="white" stroke="#cbd5e1" filter="url(#shadowSm)"/>
  <rect x="380" y="375" width="300" height="30" rx="6" fill="url(#proxyGrad)"/>
  <rect x="380" y="395" width="300" height="10" fill="url(#proxyGrad)"/>
  <text x="530" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="white">Zabbix Proxy — proxy-secure-net</text>
  <text x="530" y="426" text-anchor="middle" font-size="11" fill="#475569">zabbix-proxy-sqlite3 · Active mode</text>
  <text x="530" y="444" text-anchor="middle" font-size="11" fill="#64748b">Service: zabbix-proxy-svc · Ports 10051, 10050</text>

  <!-- Server to Proxy arrow -->
  <line x1="470" y1="300" x2="470" y2="375" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3" marker-start="url(#arrowPurple)"/>
  <text x="485" y="340" font-size="10" fill="#7c3aed">data sync :10051</text>

  <!-- Devices row -->
  <!-- Router -->
  <rect x="55" y="490" width="220" height="120" rx="6" fill="white" stroke="#cbd5e1" filter="url(#shadowSm)"/>
  <rect x="55" y="490" width="220" height="26" rx="6" fill="url(#deviceGrad)"/>
  <rect x="55" y="508" width="220" height="8" fill="url(#deviceGrad)"/>
  <text x="165" y="509" text-anchor="middle" font-size="11" font-weight="600" fill="white">router-01</text>
  <text x="165" y="534" text-anchor="middle" font-size="10" fill="#475569">Cisco ISR4451-X</text>
  <text x="165" y="550" text-anchor="middle" font-size="10" fill="#64748b">snmpsim :161/udp</text>
  <text x="165" y="566" text-anchor="middle" font-size="10" fill="#64748b">agent2 :10050/tcp</text>
  <text x="165" y="582" text-anchor="middle" font-size="10" fill="#94a3b8">4 interfaces · Group: Routers</text>
  <text x="165" y="600" text-anchor="middle" font-size="9" fill="#a5b4fc">Network Generic Device by SNMP</text>

  <!-- Switch -->
  <rect x="290" y="490" width="220" height="120" rx="6" fill="white" stroke="#cbd5e1" filter="url(#shadowSm)"/>
  <rect x="290" y="490" width="220" height="26" rx="6" fill="url(#deviceGrad)"/>
  <rect x="290" y="508" width="220" height="8" fill="url(#deviceGrad)"/>
  <text x="400" y="509" text-anchor="middle" font-size="11" font-weight="600" fill="white">switch-01</text>
  <text x="400" y="534" text-anchor="middle" font-size="10" fill="#475569">Catalyst 9300</text>
  <text x="400" y="550" text-anchor="middle" font-size="10" fill="#64748b">snmpsim :161/udp</text>
  <text x="400" y="566" text-anchor="middle" font-size="10" fill="#64748b">agent2 :10050/tcp</text>
  <text x="400" y="582" text-anchor="middle" font-size="10" fill="#94a3b8">6 interfaces · Group: Switches</text>
  <text x="400" y="600" text-anchor="middle" font-size="9" fill="#a5b4fc">Network Generic Device by SNMP</text>

  <!-- Firewall -->
  <rect x="525" y="490" width="220" height="120" rx="6" fill="white" stroke="#cbd5e1" filter="url(#shadowSm)"/>
  <rect x="525" y="490" width="220" height="26" rx="6" fill="url(#deviceGrad)"/>
  <rect x="525" y="508" width="220" height="8" fill="url(#deviceGrad)"/>
  <text x="635" y="509" text-anchor="middle" font-size="11" font-weight="600" fill="white">firewall-01</text>
  <text x="635" y="534" text-anchor="middle" font-size="10" fill="#475569">FortiGate 600E</text>
  <text x="635" y="550" text-anchor="middle" font-size="10" fill="#64748b">snmpsim :161/udp</text>
  <text x="635" y="566" text-anchor="middle" font-size="10" fill="#64748b">agent2 :10050/tcp</text>
  <text x="635" y="582" text-anchor="middle" font-size="10" fill="#94a3b8">4 interfaces · Group: Firewalls</text>
  <text x="635" y="600" text-anchor="middle" font-size="9" fill="#a5b4fc">Network Generic Device by SNMP</text>

  <!-- Dummybox -->
  <rect x="760" y="490" width="270" height="120" rx="6" fill="white" stroke="#cbd5e1" filter="url(#shadowSm)"/>
  <rect x="760" y="490" width="270" height="26" rx="6" fill="url(#linuxGrad)"/>
  <rect x="760" y="508" width="270" height="8" fill="url(#linuxGrad)"/>
  <text x="895" y="509" text-anchor="middle" font-size="11" font-weight="600" fill="white">dummybox (Linux Server)</text>
  <text x="895" y="534" text-anchor="middle" font-size="10" fill="#475569">Linux 6.1 · 4 CPUs · 16 GiB RAM</text>
  <text x="895" y="550" text-anchor="middle" font-size="10" fill="#64748b">snmpsim :161/udp</text>
  <text x="895" y="566" text-anchor="middle" font-size="10" fill="#64748b">agent2 :10050/tcp</text>
  <text x="895" y="582" text-anchor="middle" font-size="10" fill="#94a3b8">2 interfaces · Group: Servers</text>
  <text x="895" y="600" text-anchor="middle" font-size="9" fill="#a5b4fc">Linux by SNMP (CPU/mem/disk/ifaces)</text>

  <!-- Proxy to device arrows -->
  <line x1="440" y1="460" x2="165" y2="490" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="480" y1="460" x2="400" y2="490" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="570" y1="460" x2="635" y2="490" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="620" y1="460" x2="895" y2="490" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <text x="260" y="478" font-size="9" fill="#7c3aed">SNMP + Agent polling</text>

  <!-- ===== Ansible Control Node ===== -->
  <rect x="50" y="740" width="1000" height="60" rx="8" fill="url(#ansibleGrad)" filter="url(#shadow)"/>
  <text x="550" y="768" text-anchor="middle" font-size="13" font-weight="600" fill="white">Ansible Control Node</text>
  <text x="550" y="786" text-anchor="middle" font-size="11" fill="#94a3b8">community.zabbix (httpapi) · kubernetes.core · ansible-vault</text>

  <!-- Ansible arrows -->
  <line x1="250" y1="740" x2="250" y2="720" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="260" y="733" font-size="9" fill="#64748b">kubectl apply</text>
  <line x1="550" y1="740" x2="550" y2="720" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="560" y="733" font-size="9" fill="#64748b">Zabbix API :30080</text>
  <line x1="850" y1="740" x2="850" y2="720" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="860" y="733" font-size="9" fill="#64748b">kubectl apply</text>

  <!-- Legend -->
  <rect x="895" y="80" width="140" height="100" rx="5" fill="white" stroke="#e2e8f0" opacity="0.9"/>
  <text x="965" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Containers</text>
  <rect x="905" y="106" width="12" height="10" rx="2" fill="url(#pgGrad)"/>
  <text x="922" y="115" font-size="9" fill="#475569">PostgreSQL</text>
  <rect x="905" y="120" width="12" height="10" rx="2" fill="url(#serverGrad)"/>
  <text x="922" y="129" font-size="9" fill="#475569">Zabbix Server</text>
  <rect x="905" y="134" width="12" height="10" rx="2" fill="url(#proxyGrad)"/>
  <text x="922" y="143" font-size="9" fill="#475569">Zabbix Proxy</text>
  <rect x="905" y="148" width="12" height="10" rx="2" fill="url(#deviceGrad)"/>
  <text x="922" y="157" font-size="9" fill="#475569">Network Device</text>
  <rect x="905" y="162" width="12" height="10" rx="2" fill="url(#linuxGrad)"/>
  <text x="922" y="171" font-size="9" fill="#475569">Linux Server</text>

  <!-- Stats -->
  <text x="70" y="810" font-size="10" fill="#94a3b8">8 pods · 12 containers · 4 monitored devices + server self-monitoring · Zabbix 7.0 LTS</text>
</svg>
